<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{{ title or "PROJXHUB" }}</title>

  <!-- Tailwind CDN (fine for dev; we’ll replace with a build later) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX for snappy partial updates (no React needed for now) -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <header class="border-b border-slate-800">
    <nav class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-6">
      <a class="font-bold tracking-wide" href="/">PROJXHUB</a>
      <a class="opacity-80 hover:opacity-100" href="/build">Build</a>
      <a class="opacity-80 hover:opacity-100" href="/learn">Learn</a>
      <a class="opacity-80 hover:opacity-100" href="/trade">Trade</a>
      <a class="opacity-80 hover:opacity-100" href="/predict">Predict</a>
      <a class="opacity-80 hover:opacity-100" href="/marketplace">Marketplace</a>
      <a class="ml-auto opacity-80 hover:opacity-100" href="/profile">Profile</a>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>

{% extends "base.html" %}
{% block content %}
  <h1 class="text-3xl font-semibold">What do you want to create?</h1>
  <p class="mt-2 text-slate-300">Start in Learn, then Build your first on-chain product on XRPL testnet.</p>

  <div class="mt-6 grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <a href="/learn" class="p-4 rounded-xl border border-slate-800 hover:bg-slate-900">Learn</a>
    <a href="/build" class="p-4 rounded-xl border border-slate-800 hover:bg-slate-900">Build</a>
    <a href="/trade" class="p-4 rounded-xl border border-slate-800 hover:bg-slate-900">Trade</a>
  </div>

  <div class="mt-10 p-4 rounded-xl bg-slate-900 border border-slate-800">
    <div class="flex items-center justify-between">
      <div>
        <h2 class="font-semibold">XRPL Connectivity</h2>
        <p class="text-slate-400 text-sm">Click to fetch the latest validated ledger index from XRPL testnet.</p>
      </div>
      <button
        class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500"
        hx-get="/xrpl/ping"
        hx-target="#xrpl-ping-output"
        hx-swap="innerHTML">
        Ping XRPL
      </button>
    </div>
    <pre id="xrpl-ping-output" class="mt-3 text-slate-300 text-sm"></pre>
  </div>
{% endblock %}
